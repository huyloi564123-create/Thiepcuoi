<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp cưới</title>

<style>
body{margin:0;font-family:sans-serif;text-align:center;background:#fff}

/* COVER */
.cover{
 height:100vh;
 background:pink;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
}

/* NỘI DUNG */
.section{padding:40px}

/* TIM */
.heart{
 position:fixed;
 color:red;
 animation:fly 4s linear infinite;
}

@keyframes fly{
 from{transform:translateY(0)}
 to{transform:translateY(-800px)}
}
</style>
</head>

<body>

<!-- COVER -->
<div class="cover" id="cover">
<h1>Quân ❤️ Hồng</h1>
<button onclick="openInvite()">Mở thiệp</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none">
<div class="section">
<h2>Đây là nội dung cưới</h2>
<p>Đã hiện rồi 🎉</p>
</div>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8a3c0a6c1.mp3">
</audio>

<script>
function openInvite(){
 document.getElementById("cover").style.display="none";
 document.getElementById("main").style.display="block";
 document.getElementById("music").play();
}

// tim bay
setInterval(()=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="❤️";
 h.style.left=Math.random()*100+"%";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),4000);
},500);
</script>

</body>
</html>
