<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp cưới Quân & Hồng</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    text-align:center;
    background:#fff;
}
.cover{
    height:100vh;
    background:url('https://picsum.photos/800/1200') center/cover;
    display:flex;
    flex-direction:column;
    justify-content:center;
    color:white;
}
.btn{
    padding:12px 25px;
    background:#d4af37;
    border:none;
    border-radius:25px;
    color:white;
    font-size:16px;
}
.section{padding:40px 20px;}
img{width:90%;max-width:300px;border-radius:15px;margin:10px;}
</style>

</head>

<body>

<div class="cover">
<h1>Quân ❤️ Hồng</h1>
<p>Save the Date</p>
<button class="btn" onclick="openInvite()">Mở thiệp</button>
</div>

<div id="main" style="display:none">

<div class="section">
<h2>Thông tin lễ cưới</h2>
<p>20.12.2026</p>
<p>Trung tâm tiệc cưới Hoa Sen</p>
<a href="https://maps.google.com" target="_blank">📍 Xem bản đồ</a>
</div>

<div class="section">
<h2>Album</h2>
<img src="https://picsum.photos/300/400?1">
<img src="https://picsum.photos/300/400?2">
<img src="https://picsum.photos/300/400?3">
</div>

<div class="section">
<h2>Đếm ngược</h2>
<p id="cd"></p>
</div>

<div class="section">
<h2>Xác nhận tham dự</h2>
<input placeholder="Tên bạn"><br><br>
<button class="btn">Gửi</button>
</div>

</div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
function openInvite(){
 document.querySelector('.cover').style.display='none';
 document.getElementById('main').style.display='block';
 document.getElementById('music').play();
}

var d=new Date("Dec 20, 2026").getTime();
setInterval(()=>{
 let n=new Date().getTime();
 let c=Math.floor((d-n)/(1000*60*60*24));
 document.getElementById("cd").innerHTML=c+" ngày nữa";
},1000);
</script>

</body>
</html>
