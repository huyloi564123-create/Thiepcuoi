<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp cưới</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 text-align:center;
 overflow-x:hidden;
}

/* COVER */
.cover{
 height:100vh;
 background:url('https://picsum.photos/800/1200') center/cover;
 display:flex;
 flex-direction:column;
 justify-content:center;
 color:white;
 animation: fadeIn 2s;
}

.btn{
 padding:12px 25px;
 background:#d4af37;
 border:none;
 border-radius:25px;
 color:white;
 font-size:16px;
}

/* HIỆU ỨNG */
.section{
 padding:50px 20px;
 opacity:0;
 transform:translateY(30px);
 transition: all 1s;
}

.show{
 opacity:1;
 transform:translateY(0);
}

img{
 width:90%;
 max-width:300px;
 border-radius:15px;
 margin:10px;
}

@keyframes fadeIn{
 from{opacity:0}
 to{opacity:1}
}
</style>
</head>

<body>

<!-- COVER -->
<div class="cover">
<h1>Quân ❤️ Hồng</h1>
<p>Chúng mình sắp cưới</p>
<button class="btn" onclick="openInvite()">Mở thiệp</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none">

<div class="section">
<h2>Thông tin</h2>
<p>20.12.2026</p>
<p>Nhà hàng Hoa Sen</p>
</div>

<div class="section">
<h2>Album</h2>
<img src="https://picsum.photos/300/400?1">
<img src="https://picsum.photos/300/400?2">
</div>

<div class="section">
<h2>Countdown</h2>
<p id="cd"></p>
</div>

</div>

<!-- NHẠC -->
<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
// MỞ THIỆP + NHẠC (fix lỗi mobile)
function openInvite(){
 document.querySelector('.cover').style.display='none';
 document.getElementById('main').style.display='block';

 let music = document.getElementById('music');
 music.play().catch(()=>{}); // tránh lỗi bị chặn
}

// HIỆU ỨNG SCROLL
let sections = document.querySelectorAll('.section');

window.addEventListener('scroll',()=>{
 sections.forEach(sec=>{
  let top = sec.getBoundingClientRect().top;
  if(top < window.innerHeight - 100){
    sec.classList.add('show');
  }
 });
});

// COUNTDOWN
let d=new Date("Dec 20, 2026").getTime();
setInterval(()=>{
 let n=new Date().getTime();
 let c=Math.floor((d-n)/(1000*60*60*24));
 document.getElementById("cd").innerHTML=c+" ngày nữa";
},1000);
</script>

</body>
</html>
